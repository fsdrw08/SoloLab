; https://github.com/go-gitea/gitea/blob/release/v1.26/custom/conf/app.example.ini
; https://docs.gitea.com/administration/config-cheat-sheet#storage-storage

[admin]
; not allow OIDC login user delete account and change local account password in gitea
EXTERNAL_USER_DISABLE_FEATURES = deletion,manage_credentials

[cache]
ADAPTER = redis
HOST = redis://gitea:gitea@day3.redis.service.consul:6379/0?pool_size=100&idle_timeout=180s&prefix=gitea_cache:

[database]
DB_TYPE = postgres
HOST = pgbouncer.service.consul:6432
NAME = gitea
USER = {{with secret "kvv2_others/data/app-gitea"}}{{.Data.data.pgsql_user_name}}{{end}}
PASSWD = {{with secret "kvv2_others/data/app-gitea"}}{{.Data.data.pgsql_user_password}}{{end}}
SSL_MODE = require

[indexer]
ISSUE_INDEXER_TYPE = bleve

[oauth2_client]
OPENID_CONNECT_SCOPES = openid profile email groups
ENABLE_AUTO_REGISTRATION = true
USERNAME = preferred_username

[queue]
TYPE = redis
CONN_STR = redis://gitea:gitea@day3.redis.service.consul:6379/0?prefix=gitea_queue:

[security]
INSTALL_LOCK = true

[server]
USE_PROXY_PROTOCOL = false
ROOT_URL = https://gitea.day4.sololab
DOMAIN = gitea.day4.sololab
START_SSH_SERVER = true
SSH_LISTEN_PORT = 22
SSH_DOMAIN = gitea.day4.sololab
SSH_PORT = 2222

[service]
SHOW_REGISTRATION_BUTTON = false

[session]
PROVIDER = redis
PROVIDER_CONFIG = redis://gitea:gitea@day3.redis.service.consul:6379/0?prefix=gitea_session:

[storage]
STORAGE_TYPE = minio
MINIO_ENDPOINT = minio-api.day1.sololab
MINIO_ACCESS_KEY_ID = {{with secret "kvv2_minio/data/gitea"}}{{.Data.data.access_key}}{{end}}
MINIO_SECRET_ACCESS_KEY = {{with secret "kvv2_minio/data/gitea"}}{{.Data.data.secret_key}}{{end}}
MINIO_BUCKET = gitea
MINIO_USE_SSL = true
MINIO_INSECURE_SKIP_VERIFY = true

[webhook]
ALLOWED_HOST_LIST = *.sololab